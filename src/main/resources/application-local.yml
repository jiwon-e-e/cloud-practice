spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:members
    driver-class-name: org.h2.Driver
    username:
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true